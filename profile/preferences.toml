# Job Search Preferences
# Hard preferences are non-negotiable — jobs that fail these are eliminated.
# Soft preferences influence ranking — they make a job more or less attractive.

[hard]
# Location constraints
locations = ["London", "Cambridge", "Remote-UK"]
exclude_locations = []

# Visa and right to work
# Currently on UK Graduate visa valid until August 2027 — no sponsorship
# required during this window. After August 2027, Skilled Worker sponsorship
# will be required to remain in the UK.
requires_sponsorship = false

# Seniority — primary focus is entry-level. A small secondary band of
# "junior+" roles is acceptable, but anything requiring 3+ years of formal
# experience is out of reach without paid work history.
seniority_min = "internship"
seniority_max = "junior"

# Role type exclusions
exclude_role_types = [
    "consulting",
    "customer-facing",
    "management",
    "sales-engineering",
    "support-engineering",
]

# Sector exclusions
exclude_sectors = [
    "gambling",
    "adtech",
    "consumer-crypto",
]

# Tech stack must-haves (at least one must appear in the role)
tech_must_have = []

[soft]
# Preferred tech stack (higher match = higher ranking)
