# ─────────────────────────────────────────────────────────────────
# SEARCH FILTERS
# ─────────────────────────────────────────────────────────────────
# These filters control the mechanical job search pipeline (cernio search).
# They run BEFORE any AI grading — their job is to reduce thousands of
# raw ATS listings to hundreds of plausible candidates, which the AI
# then grades with full judgment.
#
# The cardinal rule: false positives are cheap (AI grades them F in
# 30 seconds), false negatives are unrecoverable (a perfect job
# silently filtered out is lost forever). When in doubt, INCLUDE.

[search_filters]
# Minimum company grade to include in job searches.
# Companies below this threshold are skipped entirely — their jobs
# are never fetched.
#
# Valid grades (from best to worst):
#   S — Excellent company. Strong engineering reputation, clear
#       technical alignment with profile, growing, likely to sponsor,
#       career progression. Examples: Palantir, Cloudflare, XTX Markets.
#   A — Good company. Solid on most dimensions, 1-2 weaknesses.
#       Good engineering work, decent growth, less brand recognition.
#   B — Decent company. Has relevant engineering work but weaker on
#       some dimensions. Maybe small, uncertain growth, or narrow domain.
#   C — Marginal. Borderline relevance but still worth searching —
#       a C company might have one genuinely good role. Job grading
#       handles quality filtering, so more jobs from weaker companies
#       is low cost (grading time) vs high potential (finding a hidden gem).
#
# Default: "C" (searches all non-archived companies)
min_company_grade = "C"

# Title must contain at least one of these keywords (OR logic).
# Case-insensitive matching. A job is KEPT if its title contains
# ANY of these. If a title matches NONE, the job is removed.
#
# Bias toward inclusion — add generously. A false positive costs
# the AI 30 seconds to grade as F. A false negative is a lost
# opportunity that can never be recovered.
#
# "Senior" was previously included but is now excluded. While some
# companies use "Senior" for 2-year roles, historically 742 Senior
# jobs graded F/C vs only 18 at B+ — a 41:1 noise ratio. The few
# genuine opportunities at accessible "Senior" titles are lost, but
# the token savings from not grading 742 noise jobs are substantial.
include_keywords = [
    # Core engineering roles
    "Engineer", "Engineering", "Developer", "Dev", "SWE", "Software",
    # Systems and infrastructure
    "Systems", "System", "Infrastructure", "Infra", "Platform",
    # Backend
    "Backend", "Back-end", "Back End",
    # Full-stack (might have backend-heavy work)
    "Fullstack", "Full-stack", "Full Stack",
    # AI/ML
    "ML", "Machine Learning", "AI", "Data",
    # Specialist domains
    "Compiler", "Runtime", "Database", "Distributed",
    "Embedded", "Low-latency", "Performance", "HFT",
    # Operations/reliability
    "DevOps", "SRE", "Reliability", "Cloud",
    # Security
    "Security", "Cryptography", "Cyber",
    # Quant
    "Quantitative", "Quant", "Research",
    # AI/ML specialisms
    "Deep Learning", "Neural Network", "Computer Vision",
    "NLP", "Reinforcement Learning",
    # Low-level / specialist
    "Firmware", "Trading", "Kernel", "Protocol",
    # Entry-level indicators
    "Graduate", "Grad", "Junior", "Entry",
    "Intern", "Internship",
    # Broad catch-all
    "Analyst",
]

# Title containing any of these is excluded (AND NOT logic).
# Case-insensitive matching using contains() — a job is REMOVED
# if its title contains ANY of these as a SUBSTRING. This means
# "account" matches "accountant", "account executive", etc.
# Exclusion runs BEFORE inclusion.
#
# ── EXCLUSION PHILOSOPHY ──
# Every keyword here was validated against the full graded job database
# (2,001 jobs across 434 companies). A keyword is ONLY added if it
# appears in ZERO jobs graded B or above. This is a hard rule — we
# accept a 100:1 F-to-good ratio before considering a keyword safe.
#
# The cost of a false negative (excluding a good job) is catastrophic
# and irreversible. The cost of a false positive (grading a bad job)
# is 30 seconds of AI time. We bias aggressively toward inclusion.
#
# Words like "market" (kills QRT SS-tier internship), "trader" (kills
# Old Mission A-tier quant role), and "operations" (kills Jane Street
# B-tier role) are deliberately NOT excluded despite high F counts
# because they appear in at least one valuable job.
#
# Each keyword below has been verified against historical data:
#   solutions: 117 F/C, 0 B+    |  sales: 71 F/C, 0 B+
#   executive: 66 F/C, 0 B+     |  account: 54 F/C, 0 B+
#   support: 38 F/C, 0 B+       |  marketing: 17 F/C, 0 B+
#   (full validation data in context/notes/grading-rubric.md)

exclude_keywords = [
    # Seniority (too experienced for entry-level candidate)
    "Senior", "Sr.", "Sr ", "Principal", "Staff", "Distinguished",
    "Director", "VP", "Vice President",
    "Head of", "Chief", "CTO", "CIO",
    "Lead",
    # Management
    "Manager", "Managing",
    # Too junior (apprenticeships/placements are different from internships)
    "Apprentice", "Placement",
    # Sales and business development (0 hits in B+ across 2,001 jobs)
    "Sales", "Account", "Executive", "BDR", "SDR",
    "Business Development", "Commercial", "GTM",
    # Customer-facing / support (0 hits in B+)
    "Solutions", "Customer", "Support", "Consult",
    # Non-engineering functions (0 hits in B+)
    "Marketing", "Communications", "Content", "Social Media",
    "Brand", "Strategist", "Evangelist",
    "Legal", "Counsel", "Paralegal", "Compliance",
    "Finance", "Tax", "Payroll", "Controller",
    "Recruit", "Talent", "People", "Onboarding",
    "Designer", "Writer", "Reporter", "Coordinator",
    "Administrator", "Procurement", "Office",
]

# ─────────────────────────────────────────────────────────────────
# LOCATION FILTERS (per ATS provider)
# ─────────────────────────────────────────────────────────────────
# Each ATS provider formats location data differently. These patterns
# are matched case-insensitively against the provider's location field.
# A job is KEPT if its location contains ANY of the patterns below.
#
# If a job's location is NULL, empty, or missing entirely, it is KEPT
# (false negative protection — the job might be in London but the
# company just didn't fill in the field).
#
# Greenhouse: location.name is freetext, often includes work policy
#   (e.g. "Hybrid", "London, England"). Some companies use semicolons
#   for multi-city: "Berlin; London; Munich".
# Lever: categories.location is a string, typically "City, Country".
# Ashby: location is freetext, often includes policy ("London Office - Hybrid").
#   Also has structured address.postalAddress with addressLocality/Country.
# Workable: separate city/country fields plus a locations array.
#   Country codes are uppercase ISO alpha-2 ("GB").
# SmartRecruiters: structured object with city, country (lowercase "gb"),
#   plus fullLocation pre-formatted string. Has server-side country filter.

[search_filters.locations.greenhouse]
patterns = ["London", "UK", "United Kingdom", "England", "Remote", "Cambridge"]

[search_filters.locations.lever]
patterns = ["London", "UK", "United Kingdom", "England", "Remote", "Cambridge"]

[search_filters.locations.ashby]
patterns = ["London", "UK", "United Kingdom", "England", "Remote", "Cambridge"]

[search_filters.locations.workable]
patterns = ["London", "GB", "United Kingdom", "Remote", "Cambridge"]

[search_filters.locations.smartrecruiters]
patterns = ["London", "gb", "United Kingdom", "Remote", "Cambridge"]

# ─────────────────────────────────────────────────────────────────
# CLEANUP THRESHOLDS
# ─────────────────────────────────────────────────────────────────
# Control what gets removed or archived when running `cernio clean`.
# All thresholds are configurable so you can tune aggressiveness.

[cleanup]
# Job grades to remove during cleanup. Jobs with these grades are
# deleted unless they have a user decision (watching/applied/rejected).
#
# Valid job grades: SS, S, A, B, C, F
# SS — Apply immediately. Everything aligns.
# S  — Strong application candidate. Most dimensions good.
# A  — Worth applying to. Good with 1-2 notable weaknesses.
# B  — Backup / worth watching. Decent but limited in some way.
# C  — Only if nothing better. Limited ceiling or poor growth.
# F  — Don't apply. Wrong seniority, dead-end, or dealbreaker.
remove_job_grades = ["F", "C"]

# Job age threshold in days. Jobs older than this with no user
# decision are removed, regardless of grade — EXCEPT SS and S
# graded jobs which are always kept as records of what companies
# look for.
stale_days = 14

# Company grades to archive during cleanup. Companies with these
# grades are set to status='archived' — hidden from TUI and excluded
# from job searches, but preserved in DB for deduplication so
# discovery won't waste time re-discovering them.
#
# Empty list means cleanup does NOT auto-archive any companies by
# grade. Companies can still be archived manually if needed.
# C-tier companies are kept active because job grading handles
# quality filtering — a C company might still have one good role.
#
# Valid company grades: S, A, B, C
archive_company_grades = []